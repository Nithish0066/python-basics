<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            padding: 30px;
        }

        .container {
            width: 350px;
            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
        }

        h2 {
            text-align: center;
        }

        .balance {
            text-align: center;
            margin: 20px 0;
        }

        .summary {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .income { color: #22c55e; }
        .expense { color: #ef4444; }

        input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 5px;
            border: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #38bdf8;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #334155;
            margin: 8px 0;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            border-radius: 5px;
        }

        .delete {
            cursor: pointer;
            color: red;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Expense Tracker</h2>

    <div class="balance">
        <h3>Balance</h3>
        <h2 id="balance">₹0</h2>
    </div>

    <div class="summary">
        <div>
            <h4>Income</h4>
            <p class="income" id="income">₹0</p>
        </div>
        <div>
            <h4>Expense</h4>
            <p class="expense" id="expense">₹0</p>
        </div>
    </div>

    <input type="text" id="text" placeholder="Enter description">
    <input type="number" id="amount" placeholder="Enter amount (+income, -expense)">
    <button onclick="addTransaction()">Add Transaction</button>

    <ul id="list"></ul>
</div>

<script>
    let transactions = JSON.parse(localStorage.getItem("transactions")) || [];

    function addTransaction() {
        const text = document.getElementById("text").value;
        const amount = +document.getElementById("amount").value;

        if (text === "" || amount === 0) return;

        const transaction = {
            id: Date.now(),
            text,
            amount
        };

        transactions.push(transaction);
        localStorage.setItem("transactions", JSON.stringify(transactions));

        updateUI();
    }

    function deleteTransaction(id) {
        transactions = transactions.filter(t => t.id !== id);
        localStorage.setItem("transactions", JSON.stringify(transactions));
        updateUI();
    }

    function updateUI() {
        const list = document.getElementById("list");
        list.innerHTML = "";

        let income = 0, expense = 0;

        transactions.forEach(t => {
            const li = document.createElement("li");

            li.innerHTML = `
                ${t.text} 
                <span>${t.amount}</span>
                <span class="delete" onclick="deleteTransaction(${t.id})">x</span>
            `;

            list.appendChild(li);

            if (t.amount > 0) income += t.amount;
            else expense += t.amount;
        });

        document.getElementById("income").innerText = "₹" + income;
        document.getElementById("expense").innerText = "₹" + Math.abs(expense);
        document.getElementById("balance").innerText = "₹" + (income + expense);
    }

    updateUI();
</script>

</body>
</html>
