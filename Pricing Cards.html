<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pricing Cards</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding: 40px;
    text-align: center;
}

h1 {
    margin-bottom: 40px;
}

.pricing-container {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
}

/* Card Style */
.card {
    background: white;
    padding: 30px;
    width: 250px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.card:hover {
    transform: translateY(-10px) scale(1.03);
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.highlight {
    border: 2px solid #007bff;
    transform: scale(1.05);
}

.highlight:hover {
    transform: translateY(-10px) scale(1.08);
}

.plan {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 10px;
}

.price {
    font-size: 28px;
    color: #007bff;
    margin: 15px 0;
}

.features {
    list-style: none;
    padding: 0;
    margin: 20px 0;
}

.features li {
    margin: 10px 0;
}

.btn {
    background: #007bff;
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.3s;
}

.btn:hover {
    background: #0056b3;
}

/* ===== MODAL ===== */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
}

.modal-content {
    background: white;
    width: 320px;
    margin: 120px auto;
    padding: 25px;
    border-radius: 12px;
    text-align: center;
    animation: popup 0.3s ease;
}

@keyframes popup {
    from {
        transform: scale(0.7);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}

.close {
    float: right;
    cursor: pointer;
    font-size: 18px;
    font-weight: bold;
}
</style>

</head>

<body>

<h1>Pricing Plans</h1>

<div class="pricing-container">

    <!-- Basic -->
    <div class="card">
        <div class="plan">Basic</div>
        <div class="price">₹199/month</div>
        <ul class="features">
            <li>1 User</li>
            <li>5GB Storage</li>
            <li>Email Support</li>
        </ul>
        <button class="btn" onclick="openModal('Basic','1 User, 5GB Storage, Email Support')">
            Choose Plan
        </button>
    </div>

    <!-- Standard -->
    <div class="card highlight">
        <div class="plan">Standard</div>
        <div class="price">₹499/month</div>
        <ul class="features">
            <li>5 Users</li>
            <li>50GB Storage</li>
            <li>Priority Support</li>
        </ul>
        <button class="btn" onclick="openModal('Standard','5 Users, 50GB Storage, Priority Support')">
            Choose Plan
        </button>
    </div>

    <!-- Premium -->
    <div class="card">
        <div class="plan">Premium</div>
        <div class="price">₹999/month</div>
        <ul class="features">
            <li>Unlimited Users</li>
            <li>200GB Storage</li>
            <li>24/7 Support</li>
        </ul>
        <button class="btn" onclick="openModal('Premium','Unlimited Users, 200GB Storage, 24/7 Support')">
            Choose Plan
        </button>
    </div>

</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="outsideClick(event)">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">✖</span>
        <h2 id="title"></h2>
        <p id="details"></p>
        <button class="btn">Proceed to Payment</button>
    </div>
</div>

<script>
function openModal(title, details) {
    document.getElementById("modal").style.display = "block";
    document.getElementById("title").innerText = title;
    document.getElementById("details").innerText = details;
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

function outsideClick(event) {
    if (event.target.id === "modal") {
        closeModal();
    }
}
</script>

</body>
</html>
