<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 320px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 {
            color: #075e54;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #25d366;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #1ebc59;
        }

        a {
            color: #25d366;
            text-decoration: none;
        }

        p {
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="card">

<h2> Login</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p> <a href="/register_page">Register</a></p>

</div>

<script>
async function login() {
    let res = await fetch('/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            username: username.value,
            password: password.value
        })
    });

    let data = await res.json();

    if (!data.token) {
        alert("Invalid login");
        return;
    }

    localStorage.setItem("token", data.token);
    localStorage.setItem("user_id", data.user_id);

    window.location = "/chat";
}
</script>

</body>
</html>
