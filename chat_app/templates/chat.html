<!DOCTYPE html>
<html>
<head>
<title>Chat App</title>

<style>
body { margin:0; font-family:'Segoe UI'; background:#f0f2f5; }

header { 
    background:#075E54; 
    color:white; 
    padding:15px; 
    display:flex;
    justify-content:space-between;
}

/* PROFILE */
.profile {
    position:relative;
    cursor:pointer;
}

.profile-menu {
    position:absolute;
    right:0;
    top:35px;
    background:white;
    color:black;
    width:150px;
    display:none;
    border-radius:5px;
}

/* LAYOUT */
.container { display:flex; height:92vh; }

.sidebar { width:30%; background:white; border-right:1px solid #ddd; }
.section { padding:10px; }

.user { padding:10px; cursor:pointer; }
.user:hover { background:#eee; }

/* GROUP HEADER */
.group-header {
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.add-btn {
    background:#25d366;
    color:white;
    border:none;
    padding:5px 10px;
    border-radius:5px;
    cursor:pointer;
}

/* CHAT */
.chat { width:70%; display:flex; flex-direction:column; }

.chat-header {
    background:#ededed;
    padding:10px;
    display:flex;
    justify-content:space-between;
}

.chat-box {
    flex:1;
    padding:10px;
    display:flex;
    flex-direction:column;
    overflow-y:auto;
    background:#e5ddd5;
}

.msg {
    max-width:60%;
    padding:10px;
    margin:5px;
    border-radius:10px;
}

.me { align-self:flex-end; background:#dcf8c6; }
.other { align-self:flex-start; background:white; }

.name { font-size:12px; color:#555; }

.input-box { display:flex; padding:10px; }
input { flex:1; padding:10px; }
button { padding:10px; background:#25d366; border:none; color:white; }

.popup {
    position:fixed;
    top:20%;
    left:35%;
    width:300px;
    background:white;
    padding:20px;
    display:none;
}

.member {
    display:flex;
    justify-content:space-between;
}
</style>
</head>

<body>

<header>

💬 Chat App

<!-- PROFILE -->
<div class="profile" onclick="toggleProfile()">
👤 Profile

<div id="profileMenu" class="profile-menu"></div>

</div>

</header>

<div class="container">

<div class="sidebar">

<div class="section">
<h3>Users</h3>
<div id="usersList"></div>
</div>

<div class="section">

<div class="group-header">
<h3>Groups</h3>
<button class="add-btn" onclick="openPopup()">+</button>
</div>

<div id="groupsList"></div>

</div>

</div>

<div class="chat">

<div class="chat-header">
<span id="chatWith">Select chat</span>

<div id="groupActions" style="display:none;">
<button onclick="showMembers()">👥 Members</button>
<button onclick="deleteGroup()">Delete</button>
</div>
</div>

<div id="chatBox" class="chat-box"></div>

<div class="input-box">
<input id="msg">
<button onclick="sendMessage()">Send</button>
</div>

</div>

</div>

<!-- CREATE GROUP -->
<div class="popup" id="groupPopup">
<h2>Create Group</h2>
<h10>Group name</h10>
<input id="groupName">
<div id="userCheckboxList"></div>
<button onclick="createGroup()">Create</button>
<button onclick="closePopup()">Close</button>
</div>

<!-- MEMBERS -->
<div class="popup" id="membersPopup">
<h3>Members</h3>
<div id="membersList"></div>
<button onclick="closeMembers()">Close</button>
</div>

<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

<script>
const socket = io();
const token = localStorage.getItem("token");
const user_id = Number(localStorage.getItem("user_id"));

let currentReceiver=null;
let currentGroup=null;

socket.emit('connect_user',{token});

// 🔥 PROFILE MENU (UPDATED)
async function toggleProfile(){
 let menu = document.getElementById("profileMenu");

 if(menu.style.display === "block"){
  menu.style.display = "none";
  return;
 }

 let res = await fetch("/users", {
  headers: { Authorization: "Bearer " + token }
 });

 let users = await res.json();

 menu.innerHTML = "";

 users.forEach(u=>{
  menu.innerHTML += `
   <div style="padding:10px;cursor:pointer;"
    onclick="switchUser('${u.username}')">
    ${u.username}
   </div>`;
 });

 menu.innerHTML += `
   <div style="padding:10px;color:red;" onclick="logout()">
    Logout
   </div>
 `;

 menu.style.display = "block";
}

// 🔥 SWITCH USER (UPDATED)
function switchUser(username){
 localStorage.setItem("switch_user", username);
 window.location = "/"; // go to login page
}

// USERS
async function loadUsers(){
 let res=await fetch("/users",{headers:{Authorization:"Bearer "+token}});
 let data=await res.json();

 usersList.innerHTML="";
 userCheckboxList.innerHTML="";

 data.forEach(u=>{
  usersList.innerHTML+=`<div class="user" onclick="openUser(${u.id},'${u.username}')">${u.username}</div>`;

  userCheckboxList.innerHTML+=`
   <div><input type="checkbox" value="${u.id}"> ${u.username}</div>`;
 });
}

// PRIVATE
async function openUser(id,name){
 currentReceiver=id;
 currentGroup=null;

 groupActions.style.display="none";

 chatWith.innerText=name;

 let res=await fetch("/messages/"+id,{headers:{Authorization:"Bearer "+token}});
 let data=await res.json();

 chatBox.innerHTML="";
 data.forEach(m=>{
  chatBox.innerHTML+=`<div class="msg ${m.sender==user_id?'me':'other'}">${m.text}</div>`;
 });
}

// GROUP
async function openGroup(id,name){
 currentGroup=id;
 currentReceiver=null;

 groupActions.style.display="block";

 chatWith.innerText="Group: "+name;

 let res=await fetch("/group_messages/"+id,{
  headers:{Authorization:"Bearer "+token}
 });

 let data=await res.json();

 chatBox.innerHTML="";
 data.forEach(m=>{
  if(m.sender_id==user_id){
   chatBox.innerHTML+=`<div class="msg me">${m.text}</div>`;
  } else {
   chatBox.innerHTML+=`
    <div class="msg other">
      <div class="name">${m.sender_name}</div>
      ${m.text}
    </div>`;
  }
 });
}

// CREATE GROUP
async function createGroup(){
 let selected=[];
 document.querySelectorAll("#userCheckboxList input:checked")
 .forEach(cb=>selected.push(parseInt(cb.value)));

 await fetch("/create_group",{
  method:"POST",
  headers:{
   "Content-Type":"application/json",
   Authorization:"Bearer "+token
  },
  body:JSON.stringify({name:groupName.value,members:selected})
 });

 closePopup();
 loadGroups();
}

// GROUPS
async function loadGroups(){
 let res=await fetch("/groups",{headers:{Authorization:"Bearer "+token}});
 let data=await res.json();

 groupsList.innerHTML="";
 data.forEach(g=>{
  groupsList.innerHTML+=`<div class="user" onclick="openGroup(${g.id},'${g.name}')">${g.name}</div>`;
 });
}

// MEMBERS
async function showMembers(){
 if(!currentGroup){ alert("Open group first"); return; }

 let res=await fetch("/group_members/"+currentGroup,{
  headers:{Authorization:"Bearer "+token}
 });

 let data=await res.json();

 membersList.innerHTML="";
 data.forEach(u=>{
  membersList.innerHTML+=`
   <div class="member">
    ${u.username}
    <button onclick="removeMember(${u.id})">❌</button>
   </div>`;
 });

 document.getElementById("membersPopup").style.display="block";
}

// REMOVE MEMBER
async function removeMember(id){
 await fetch("/remove_member",{
  method:"POST",
  headers:{
   "Content-Type":"application/json",
   Authorization:"Bearer "+token
  },
  body:JSON.stringify({group_id:currentGroup,user_id:id})
 });

 showMembers();
}

// DELETE
async function deleteGroup(){
 await fetch("/delete_group/"+currentGroup,{
  method:"DELETE",
  headers:{Authorization:"Bearer "+token}
 });
 loadGroups();
}

// SEND
function sendMessage(){
 let text=msg.value;

 if(currentReceiver){
  socket.emit('send_message',{token,receiver:currentReceiver,message:text});
 }

 if(currentGroup){
  socket.emit('send_group_message',{token,group_id:currentGroup,message:text});
 }

 msg.value="";
}

// RECEIVE
socket.on('receive_group_message',d=>{
 if(d.group_id==currentGroup){
  if(d.sender_id==user_id){
   chatBox.innerHTML+=`<div class="msg me">${d.message}</div>`;
  } else {
   chatBox.innerHTML+=`
    <div class="msg other">
      <div class="name">${d.sender_name}</div>
      ${d.message}
    </div>`;
  }
 }
});

// POPUP
function openPopup(){ groupPopup.style.display="block"; }
function closePopup(){ groupPopup.style.display="none"; }
function closeMembers(){ membersPopup.style.display="none"; }

// LOGOUT
function logout(){ localStorage.clear(); location="/"; }

// INIT
loadUsers();
loadGroups();
</script>

</body>
</html>
