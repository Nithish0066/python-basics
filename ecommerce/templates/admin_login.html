{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center align-items-center" style="height:80vh;">
    <div class="col-md-5">
        <div class="card p-5">

            <h3 class="text-center fw-bold mb-4 text-danger">Admin Login</h3>

            <form method="POST">

                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-danger w-100 mt-3">
                    Login as Admin
                </button>

            </form>

            <div class="text-center mt-3">
                <a href="{{ url_for('role_selection') }}">Back to Role Selection</a>
            </div>

        </div>
    </div>
</div>

{% endblock %}
