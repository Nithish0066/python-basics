<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Select Role</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg,#434346,#6366f1);
}

.role-card {
    background: white;
    border-radius: 20px;
    padding: 50px;
    text-align: center;
    width: 450px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.2);
}

.role-card h2 {
    font-weight: 700;
    margin-bottom: 30px;
}

.btn-role {
    border-radius: 12px;
    padding: 12px;
    font-weight: 600;
}
</style>
</head>

<body>

<div class="role-card">

    <h2>Welcome to E-Shop</h2>
    <p class="text-muted mb-4">Select your login type</p>

    <a href="{{ url_for('user_login') }}" class="btn btn-primary btn-role w-100 mb-3">
        Login as User
    </a>

    <a href="{{ url_for('admin_login') }}" class="btn btn-dark btn-role w-100">
        Login as Admin
    </a>

</div>

</body>
</html>
