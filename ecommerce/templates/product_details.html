{% extends "base.html" %}
{% block content %}

<div class="card p-5">

    <div class="row">

        <div class="col-md-5">
            {% if product.image %}
            <img src="{{ url_for('static', filename='uploads/' + product.image) }}"
                 class="img-fluid"
                 style="border-radius:20px; height:350px; object-fit:cover;">
            {% endif %}
        </div>

        <div class="col-md-7">

            <h2 class="mb-3">{{ product.name }}</h2>

            <p class="text-muted mb-3">
                Category: {{ product.category }}
            </p>

            <h4 class="mb-3 text-success">
                ₹ {{ product.price }}
            </h4>

            <p class="mb-4">
                {{ product.description }}
            </p>

            <div class="d-flex gap-3">
                <a href="{{ url_for('add_to_cart', product_id=product.id) }}"
                   class="btn btn-primary">
                    Add to Cart
                </a>

                <a href="{{ url_for('home') }}"
                   class="btn btn-outline-secondary">
                    Back
                </a>
            </div>

        </div>

    </div>

</div>

{% endblock %}
